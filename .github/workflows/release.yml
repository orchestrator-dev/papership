name: Release Papership

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: ./papership
        run: flutter pub get

      # To sign the app, you need to configure Secrets in your GitHub repository:
      # KEYSTORE_BASE64: Base64 encoded keystore file (`base64 upload-keystore.jks`)
      # KEY_ALIAS: The alias used when generating the keystore
      # KEY_PASSWORD: The password for the alias
      # STORE_PASSWORD: The password for the keystore
      
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > ./papership/android/app/upload-keystore.jks
          fi

      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEY_ALIAS" ]; then
            cat <<EOF > ./papership/android/key.properties
            storePassword=$STORE_PASSWORD
            keyPassword=$KEY_PASSWORD
            keyAlias=$KEY_ALIAS
            storeFile=upload-keystore.jks
            EOF
          fi

      - name: Build APK (for direct download)
        working-directory: ./papership
        run: flutter build apk --release

      - name: Build AAB (for Google Play)
        working-directory: ./papership
        run: flutter build appbundle --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            papership/build/app/outputs/flutter-apk/app-release.apk
            papership/build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
